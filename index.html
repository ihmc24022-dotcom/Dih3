<!DOCTYPE html>
<html>
  <head>
    <title>Angry Birds Chrome - Debug Mode</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
      #debug-log {
        position: fixed; top: 0; left: 0; width: 100%; height: 30vh; 
        background: rgba(0,0,0,0.9); color: #0f0; z-index: 9999; 
        overflow-y: auto; font-family: monospace; font-size: 14px; padding: 10px;
        box-sizing: border-box; word-wrap: break-word;
      }
    </style>
    <script>
      // 强行拦截所有报错
      window.onerror = function(msg, url, line) {
        var log = document.getElementById('debug-log');
        if(log) log.innerHTML += '<br/>❌ 报错: ' + msg + ' (在第 ' + line + ' 行)';
        return false;
      };
      // 强行拦截所有运行日志
      var oldLog = console.log;
      console.log = function(msg) {
        var log = document.getElementById('debug-log');
        if(log) log.innerHTML += '<br/>✅ 日志: ' + msg;
        oldLog.apply(console, arguments);
      };
    </script>

    <link href='https://fonts.googleapis.com/css?family=Terminal+Dosis:800' rel='stylesheet' type='text/css'>
    <link rel="stylesheet" href="css/angry_birds_chrome.css" type="text/css">

    <script type="text/javascript" src="fowl/fowl.nocache.js"></script>
  </head>
  <body>
    <div id="debug-log">等待系统启动...<br/></div>

    <div class="gamecont" id="content">
      <div id='gameDiv' style="display: inline-block;">
        <div id='playn-root' style="border: 2px solid red; min-height: 400px; width: 800px; display: flex; justify-content: center; align-items: center;">
          <div id="loading">
            <img src="images/loading_image_bird.png" alt="如果路径正确，这里会有一只鸟" />
          </div>
        </div>
      </div>
    </div>

    <script type="text/javascript">
      window.onload = function() {
        console.log("网页已加载完成，正在等待 fowl.nocache.js 启动引擎...");
        document.getElementById('content').style.display = 'block';
      };
    </script>
  </body>
</html>
