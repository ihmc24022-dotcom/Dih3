    <script type="text/javascript">
        function getFlashVersion() {
            try {
                var version;
                try {
                    version = new ActiveXObject("ShockwaveFlash.ShockwaveFlash").GetVariable("$version");
                } catch (e) {
                    version = navigator.plugins["Shockwave Flash"].description;
                }
                return version.replace(/\D*(\d+).*/g, "$1");
            } catch (e) {
                return -1;
            }
        }

        function haveAudioSupport() {
            try {
              var AudioContext = window.AudioContext || window.webkitAudioContext;
              if (new AudioContext()) {
                return true;
              }
            } catch (ignore) { }
            return getFlashVersion() >= 9.0;
        }
    </script>

    <script type="text/javascript">

    <script type="text/javascript">
      // 强行显示游戏区域，防止被旧的 iframe 检测代码隐藏
      window.onload = function() {
        var content = document.getElementById('content');
        if (content) {
          content.style.display = 'block';
          if (content.parentNode) content.parentNode.style.display = 'block';

        var gameDiv = document.getElementById('gameDiv');
